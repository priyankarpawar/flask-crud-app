<html>
<head>
<style>
body { font-family: Arial; margin: 40px; background: #f5f5f5; }
li { margin: 10px 0; }
</style>
</head>
<body>

<h2>Student List</h2>
<a href="/add">Add Student</a>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for msg in messages %}
      <p style="color:green">{{ msg }}</p>
    {% endfor %}
  {% endif %}
{% endwith %}

<ul>
  {% for s in students %}
    <li>
      {{ s.name }} - {{ s.email }}
      <a href="/edit/{{ s.id }}">Edit</a>
      <a href="/delete/{{ s.id }}" onclick="return confirm('Are you sure?')">Delete</a>
    </li>
  {% endfor %}
</ul>

</body>
</html>
